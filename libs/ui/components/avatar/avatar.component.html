<span class="ui-avatar__frame">
  @if (showInitials()) {
    <span class="ui-avatar__initials" role="img" [attr.aria-label]="name() || null">
      {{ initials() }}
    </span>
  } @else {
    <img
      class="ui-avatar__img"
      [src]="src()"
      [alt]="name()"
      (error)="imgError.set(true)"
    />
  }
</span>
@if (status()) {
  <span
    class="ui-avatar__status"
    [attr.data-status]="status()"
    role="img"
    [attr.aria-label]="statusLabel()"
  ></span>
}
