<div class="ui-alert__container" [attr.role]="ariaRole()">
  <span class="ui-alert__icon" aria-hidden="true">
    <ng-content select="[slot=icon]" />
  </span>

  <span class="ui-alert__body">
    <ng-content />
  </span>

  @if (dismissible()) {
    <button
      class="ui-alert__dismiss"
      type="button"
      aria-label="Dismiss"
      (click)="handleDismiss()"
    >
      <span aria-hidden="true">&times;</span>
    </button>
  }
</div>
