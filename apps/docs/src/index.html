<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Onyx UI — Accessible, token-themed Angular components</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Onyx UI is a styled-mode Angular 19 component library driven by design tokens: accessible, signal-based, standalone components you can re-skin per client with a single preset."
    />

    <!-- Browser UI color, matched to --docs-page-bg in light/dark -->
    <meta
      name="theme-color"
      media="(prefers-color-scheme: light)"
      content="#f8fafc"
    />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: dark)"
      content="#0f172a"
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Onyx UI" />
    <meta
      property="og:title"
      content="Onyx UI — Accessible, token-themed Angular components"
    />
    <meta
      property="og:description"
      content="A styled-mode Angular component library driven by design tokens. Accessible, signal-based and standalone — re-skin per client with one preset."
    />
    <meta property="og:url" content="https://onyx.a-robertdev.com" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta
      name="twitter:title"
      content="Onyx UI — Accessible, token-themed Angular components"
    />
    <meta
      name="twitter:description"
      content="A styled-mode Angular component library driven by design tokens. Accessible, signal-based and standalone."
    />

    <!-- Brand favicon: rounded square + dot in primary indigo (inline SVG) -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20rx='8'%20fill='%236366f1'/%3E%3Ccircle%20cx='16'%20cy='16'%20r='6'%20fill='%23fff'/%3E%3C/svg%3E"
    />

    <!-- Prevent white flash before Angular boots -->
    <style>
      html,
      body {
        margin: 0;
        background: #f8fafc;
      }
      @media (prefers-color-scheme: dark) {
        html,
        body {
          background: #0f172a;
        }
      }
    </style>
  </head>
  <body>
    <docs-root></docs-root>
    <noscript>
      Onyx UI documentation requires JavaScript. Please enable JavaScript in
      your browser to view the live component demos.
    </noscript>
  </body>
</html>
